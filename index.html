<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<meta name="description" content="TradeLab — an offline day trading study and practice platform: strategy playbooks, education hub, trade journal, risk tools, pre-market checklist and quizzes.">
<meta name="theme-color" id="meta-theme-color" content="#0d0d0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TradeLab">
<title>TradeLab — Day Trading Study &amp; Practice</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='12' width='5' height='12' rx='1.5' fill='%23d03b3b'/%3E%3Crect x='6' y='8' width='1.2' height='19' fill='%23d03b3b'/%3E%3Crect x='13' y='7' width='5' height='12' rx='1.5' fill='%230ca30c'/%3E%3Crect x='15' y='4' width='1.2' height='18' fill='%230ca30c'/%3E%3Crect x='22' y='11' width='5' height='11' rx='1.5' fill='%230ca30c'/%3E%3Crect x='24' y='7' width='1.2' height='18' fill='%230ca30c'/%3E%3C/svg%3E">
<script>
/* Theme boot before first paint to avoid flash */
(function () {
  var t;
  /* App.Store JSON-encodes values, so the stored theme is '"light"' with quotes */
  try { t = JSON.parse(localStorage.getItem('tdp.theme')); } catch (e) {}
  if (t !== 'light' && t !== 'dark') {
    t = (window.matchMedia && matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app" id="app">
  <div class="backdrop" id="backdrop" hidden></div>

  <aside class="sidebar" id="sidebar" aria-label="Sidebar">
    <a class="brand" href="#/dashboard">
      <svg viewBox="0 0 32 32" width="26" height="26" aria-hidden="true">
        <rect x="4" y="12" width="5" height="12" rx="1.5" fill="var(--neg)"/>
        <rect x="6" y="8" width="1.2" height="19" fill="var(--neg)"/>
        <rect x="13" y="7" width="5" height="12" rx="1.5" fill="var(--pos)"/>
        <rect x="15" y="4" width="1.2" height="18" fill="var(--pos)"/>
        <rect x="22" y="11" width="5" height="11" rx="1.5" fill="var(--pos)"/>
        <rect x="24" y="7" width="1.2" height="18" fill="var(--pos)"/>
      </svg>
      <span>Trade<b>Lab</b></span>
    </a>
    <nav class="nav" id="nav" aria-label="Main navigation"></nav>
    <div class="sidebar-foot">
      <p class="small muted">Educational purposes only — not financial advice. All data stays on this device.</p>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="icon-btn mobile-only" id="menu-btn" aria-label="Open navigation menu"></button>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right">
        <div class="mkt-pill" id="mkt-pill" title="US equities session (Eastern Time)"></div>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark / light theme"></button>
        <a class="icon-btn" id="settings-btn" href="#/settings" aria-label="Settings"></a>
      </div>
    </header>
    <main id="content" class="content" tabindex="-1"></main>
    <footer class="app-foot">
      <span>TradeLab — offline study &amp; practice platform</span>
      <span>Educational purposes only. Not financial advice.</span>
    </footer>
  </div>
</div>

<noscript>
  <div style="padding:2rem;font-family:system-ui,sans-serif;max-width:40rem;margin:0 auto">
    <h1>TradeLab</h1>
    <p>This app requires JavaScript. Please enable JavaScript and reload the page.</p>
  </div>
</noscript>

<script src="js/charts.js" defer></script>
<script src="js/data/strategies.js" defer></script>
<script src="js/data/strategies-extra.js" defer></script>
<script src="js/data/education.js" defer></script>
<script src="js/data/education-extra.js" defer></script>
<script src="js/checklist.js" defer></script>
<script src="js/diary.js" defer></script>
<script src="js/journal.js" defer></script>
<script src="js/insights.js" defer></script>
<script src="js/tools.js" defer></script>
<script src="js/quiz.js" defer></script>
<script src="js/backup.js" defer></script>
<script src="js/settings.js" defer></script>
<script src="js/app.js" defer></script>
</body>
</html>
